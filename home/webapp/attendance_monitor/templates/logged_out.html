<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .logout-container {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            padding: 50px 40px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 32px;
            position: relative;
            display: inline-block;
        }

        h2:after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        .logout-icon {
            font-size: 80px;
            margin: 30px 0;
            color: #667eea;
            animation: iconBounce 1s ease-in-out;
        }

        @keyframes iconBounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }

        p {
            color: #666;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .login-link {
            display: inline-block;
            padding: 14px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .login-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 7px 20px rgba(102, 126, 234, 0.4);
        }

        .additional-links {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .additional-links a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .additional-links a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .countdown {
            margin-top: 15px;
            color: #888;
            font-size: 14px;
        }

        .countdown-number {
            font-weight: bold;
            color: #667eea;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .logout-container {
                padding: 40px 25px;
            }
            
            h2 {
                font-size: 28px;
            }
            
            .logout-icon {
                font-size: 60px;
            }
            
            p {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <h2>Logged Out</h2>
        <div class="logout-icon">&#x1F44B; </div>
        <p>You have successfully logged out of your account.</p>
        <p>Thank you for using our service. We hope to see you again soon!</p>
        <a href="{% url 'login' %}" class="login-link">Login Again</a>
        <div class="countdown">Redirecting to login page in <span class="countdown-number">5</span> seconds...</div>
        
        <div class="additional-links">
            <a href="{% url 'signup' %}">Create New Account</a>
            <a href="/">Return to Homepage</a>
            <a href="mailto:support@example.com">Contact Support</a>
        </div>
    </div>

    <script>
        // Countdown and redirect functionality
        let countdown = 5;
        const countdownElement = document.querySelector('.countdown-number');
        const countdownInterval = setInterval(() => {
            countdown--;
            countdownElement.textContent = countdown;
            
            if (countdown <= 0) {
                clearInterval(countdownInterval);
                window.location.href = "{% url 'login' %}";
            }
        }, 1000);
        
        // Optional: Allow user to cancel the redirect by clicking anywhere
        document.addEventListener('click', function() {
            clearInterval(countdownInterval);
            document.querySelector('.countdown').innerHTML = 'Redirect cancelled. Click "Login Again" to proceed.';
        });
    </script>
</body>
</html>
